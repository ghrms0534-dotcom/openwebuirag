name: openwebui-rag

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.8
    ports:
      - "3000:8080"
    volumes:
      - open-webui:/app/backend/data
      - ../data/documents:/app/backend/data/docs
      - ../data/logs:/app/backend/data/logs
    env_file:
      - ../config/env/${ENV_FILE:-local}.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      tika:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: openwebui
      POSTGRES_USER: openwebui
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openwebui}
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openwebui -d openwebui"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.17.0
    volumes:
      - qdrant:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  tika:
    image: openwebui-rag-tika:latest
    build:
      context: ./tika
      dockerfile: Dockerfile
    command: ["--host=0.0.0.0", "-config", "/tika-config.xml"]
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/9998'"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - open-webui
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped

volumes:
  open-webui:
  postgres:
  qdrant:
